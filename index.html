<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>コエログ</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #222;
      color: #fff;
      padding: 10px 16px;
    }
    main {
      padding: 16px;
    }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    select {
      padding: 6px;
    }
    .status {
      margin-bottom: 12px;
      font-size: 13px;
      color: #555;
    }
    .warning {
      color: red;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .transcript {
      background: #fff;
      padding: 12px;
      height: 300px;
      overflow-y: auto;
      border: 1px solid #ccc;
      font-family: monospace;
    }
    .row {
      margin-bottom: 6px;
    }
  </style>
  <script src="./ivc_koelog/coi-serviceworker.js"></script>
</head>

<body>

<header>
  <h2>コエログ</h2>
  <div>
    <h3 id="buildInfo"></h3>
  </div>
</header>

<main>

  <!-- ⚠️ 法的注意 -->
  <div class="warning">
    ※このツールは録音対象者の同意を得た上で使用してください
  </div>

  <!-- 設定 -->
  <div class="controls">
    <button id="btnStartMic">🎤 マイク開始</button>
    <button id="btnStartDesktop">🖥 画面音声開始</button>
    <button id="btnStop">⏹ 停止</button>

    <select id="modelSelect">
      <option value="tiny">tiny（軽量）</option>
      <option value="base">base（高精度）</option>
    </select>
  </div>

  <!-- 状態表示 -->
  <div class="status" id="status">
    状態: 停止中
  </div>

  <!-- 証明書導線（社内用） -->
  <div class="status">
    社内利用の場合：
    <a href="./cert/intra.cer" download>証明書をダウンロード</a>
  </div>

  <!-- 文字起こし -->
  <div class="transcript" id="transcript"></div>

</main>

<script type="module" src="/src/main/index.ts"></script>

</body>
</html>
